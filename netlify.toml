[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/admin/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/admin/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

[[redirects]]
  from = "/admin/sw.js"
  to = "/admin/sw.js"
  status = 200
  force = true

[[redirects]]
  from = "/admin/manifest.webmanifest"
  to = "/admin/manifest.webmanifest"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
