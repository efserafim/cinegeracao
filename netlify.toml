[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/admin/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/admin/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

# Proxy da API para o Render (obrigatório: sem isso /api vira o HTML do SPA e o login falha no PWA)
[[redirects]]
  from = "/api/*"
  to = "https://cinegeracao.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://cinegeracao.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/sw.js"
  to = "/admin/sw.js"
  status = 200
  force = true

[[redirects]]
  from = "/admin/manifest.webmanifest"
  to = "/admin/manifest.webmanifest"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
